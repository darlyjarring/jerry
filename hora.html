<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiApp GH - Gestión de Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-900 tracking-tighter">LOGIAPP <span class="text-blue-600">GH</span></h1>
            <button onclick="window.location.href='index.html'" class="text-xs font-bold text-gray-500 hover:text-blue-900">
                <i class="fas fa-arrow-left mr-1"></i> VOLVER AL REGISTRO
            </button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 mt-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-600">
                <h2 class="text-lg font-black text-slate-800 mb-4 uppercase">Nuevo Oficial</h2>
                <form id="formOficial" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Nombre Completo</label>
                        <input type="text" id="nombreOficial" class="w-full p-3 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: Juan Ramirez" required>
                    </div>
                    <button type="submit" id="btnSave" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                        <i class="fas fa-save mr-2"></i> GUARDAR EN HOJA "OFICIALES"
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-slate-800">
                <h2 class="text-lg font-black text-slate-800 mb-4 uppercase flex justify-between items-center">
                    Lista Actual <span id="count" class="text-xs bg-slate-100 px-2 py-1 rounded">0</span>
                </h2>
                <div id="listaContenedor" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 text-sm font-bold text-slate-600">
                    Cargando...
                </div>
            </div>

        </div>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec";

        window.onload = cargar;

        // Función para convertir a formato Título (Primera letra mayúscula)
        function formatNombre(str) {
            return str.toLowerCase().split(' ').map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        }

        function cargar() {
            const callbackName = 'cb_' + Date.now();
            window[callbackName] = function(res) {
                document.getElementById('count').innerText = res.oficiales.length;
                document.getElementById('listaContenedor').innerHTML = res.oficiales.map(o => `
                    <div class="p-3 bg-slate-50 rounded border border-slate-100 flex justify-between">
                        <span>${o}</span>
                        <i class="fas fa-check-circle text-green-500"></i>
                    </div>
                `).join('');
                delete window[callbackName];
            };
            const s = document.createElement('script');
            s.src = APP_URL + "?action=getData&callback=" + callbackName;
            document.body.appendChild(s);
        }

        document.getElementById('formOficial').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            
            // Aplicamos el formato antes de enviar al servidor
            const nombreRaw = document.getElementById('nombreOficial').value;
            const nombreFormateado = formatNombre(nombreRaw);
            
            btn.disabled = true;
            btn.innerHTML = "GUARDANDO...";

            fetch(APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nuevoOficial: nombreFormateado })
            }).then(() => {
                alert("Oficial guardado como: " + nombreFormateado);
                location.reload();
            }).catch(() => {
                alert("Error al conectar con el servidor");
                btn.disabled = false;
                btn.innerHTML = "GUARDAR EN HOJA 'OFICIALES'";
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Horas - LogiApp GH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-excel { border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-history text-xl text-blue-300"></i>
                <h1 class="text-lg font-black tracking-tighter uppercase">Conversor de <span class="text-blue-300">Tiempos Extra</span></h1>
            </div>
            <a href="index.html" class="text-[10px] bg-blue-800 px-3 py-1 rounded-full font-bold hover:bg-blue-700 uppercase">
                <i class="fas fa-arrow-left mr-1"></i> Volver
            </a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Configuración de Costos (Para calcular el tiempo)</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-blue-600 mb-1 uppercase">Precio Hora Normal ($)</label>
                    <input type="number" id="precioBase" value="2.50" step="0.01" class="w-full p-2 bg-blue-50 border border-blue-100 rounded-lg text-sm font-bold outline-none">
                    <p class="text-[8px] text-slate-400 mt-1">* Se usará para dividir el monto total.</p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase text-center invisible">Espaciador</label>
                    <div class="text-center py-2 text-slate-300"><i class="fas fa-arrow-right"></i></div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Inicio</label>
                    <input type="date" id="resIni" class="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Fin</label>
                    <input type="date" id="resFin" class="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none">
                </div>
            </div>
            <button onclick="generarResumen()" class="w-full mt-4 bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 transition-all shadow-md active:scale-95">
                <i class="fas fa-sync-alt mr-2"></i> GENERAR RESUMEN DE TIEMPOS
            </button>
        </div>

        <div id="accionesExport" class="hidden flex flex-col md:flex-row gap-3">
            <div class="flex-1">
                <select id="filtroOficial" class="w-full p-3 bg-white border rounded-xl text-sm font-bold text-blue-900 shadow-sm outline-none">
                    <option value="TODOS">-- TODOS LOS OFICIALES --</option>
                </select>
            </div>
            <button onclick="descargarExcel()" class="bg-green-600 text-white font-black px-6 py-3 rounded-xl hover:bg-green-700 shadow-md flex items-center justify-center">
                <i class="fas fa-file-excel mr-2 text-lg"></i> DESCARGAR REPORTE
            </button>
        </div>

        <div id="contenedorResumen" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>

    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec";
        let datosGlobales = null;

        // Función para convertir Horas Decimales a HH:MM
        function formatoReloj(decimal) {
            if (!decimal || decimal <= 0) return "0:00";
            const horas = Math.floor(decimal);
            const minutos = Math.round((decimal - horas) * 60);
            return `${horas}:${minutos.toString().padStart(2, '0')}`;
        }

        function generarResumen() {
            const ini = document.getElementById('resIni').value;
            const fin = document.getElementById('resFin').value;
            if(!ini || !fin) return alert("Selecciona el rango de fechas");

            const contenedor = document.getElementById('contenedorResumen');
            contenedor.innerHTML = `<div class="col-span-full text-center py-10"><i class="fas fa-spinner animate-spin text-3xl text-blue-600 mb-2"></i><p class="text-[10px] font-black text-slate-400 uppercase">Calculando equivalencias de tiempo...</p></div>`;

            const callbackName = 'cb_resumen';
            window[callbackName] = function(data) {
                datosGlobales = data;
                renderizarTarjetas(data);
                poblarSelectOficiales(data);
                document.getElementById('accionesExport').classList.remove('hidden');
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${APP_URL}?action=getResumen&ini=${ini}&fin=${fin}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        function renderizarTarjetas(data) {
            const contenedor = document.getElementById('contenedorResumen');
            const precioBase = parseFloat(document.getElementById('precioBase').value) || 1;
            
            // Definición de recargos legales
            const factor50 = precioBase * 1.5;
            const factor100 = precioBase * 2.0;

            let html = '';
            
            Object.keys(data).forEach(oficial => {
                const o = data[oficial];
                
                // Convertimos el DINERO acumulado a HORAS DECIMALES
                // Dinero / (Precio Hora * Recargo) = Cantidad de Horas
                const horas50 = o.h50 / factor50;
                const horas100 = o.h100 / factor100;

                html += `
                    <div class="bg-white p-5 rounded-2xl card-excel shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 class="font-black text-blue-900 text-sm uppercase">${oficial}</h3>
                            <span class="text-[9px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded border">${o.viajes} VIAJES</span>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-3">
                            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                <span class="text-[10px] font-bold text-slate-500 uppercase">Total en Ruta:</span>
                                <span class="text-sm font-black text-slate-800">${formatoReloj(o.total)}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                    <p class="text-[8px] font-bold text-blue-400 uppercase mb-1">Tiempo al 50%</p>
                                    <p class="text-xl font-black text-blue-700">${formatoReloj(horas50)}</p>
                                    <p class="text-[9px] text-blue-400">De $${o.h50.toFixed(2)}</p>
                                </div>
                                <div class="bg-red-50 p-3 rounded-xl border border-red-100">
                                    <p class="text-[8px] font-bold text-red-400 uppercase mb-1">Tiempo al 100%</p>
                                    <p class="text-xl font-black text-red-700">${formatoReloj(horas100)}</p>
                                    <p class="text-[9px] text-red-400">De $${o.h100.toFixed(2)}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        function poblarSelectOficiales(data) {
            const select = document.getElementById('filtroOficial');
            select.innerHTML = '<option value="TODOS">-- TODOS LOS OFICIALES --</option>';
            Object.keys(data).sort().forEach(oficial => {
                const opt = document.createElement('option');
                opt.value = oficial; opt.innerText = oficial;
                select.appendChild(opt);
            });
        }

        function descargarExcel() {
            if (!datosGlobales) return;
            const oficialSeleccionado = document.getElementById('filtroOficial').value;
            const precioBase = parseFloat(document.getElementById('precioBase').value) || 1;
            const factor50 = precioBase * 1.5;
            const factor100 = precioBase * 2.0;

            const filasExcel = [];
            filasExcel.push(["REPORTE DE TIEMPOS EXTRA CALCULADOS DESDE MONTOS"]);
            filasExcel.push(["PRECIO HORA BASE:", `$${precioBase.toFixed(2)}`]);
            filasExcel.push([]); 
            filasExcel.push(["OFICIAL", "TOTAL HH:MM", "TIEMPO 50% (HH:MM)", "TIEMPO 100% (HH:MM)", "MONTO 50% ($)", "MONTO 100% ($)"]);

            const procesarFila = (oficial) => {
                const o = datosGlobales[oficial];
                return [
                    oficial, 
                    formatoReloj(o.total), 
                    formatoReloj(o.h50 / factor50), 
                    formatoReloj(o.h100 / factor100),
                    o.h50.toFixed(2),
                    o.h100.toFixed(2)
                ];
            };

            if (oficialSeleccionado === "TODOS") {
                Object.keys(datosGlobales).forEach(oficial => filasExcel.push(procesarFila(oficial)));
            } else {
                filasExcel.push(procesarFila(oficialSeleccionado));
            }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(filasExcel);
            XLSX.utils.book_append_sheet(wb, ws, "TiemposExtra");
            XLSX.writeFile(wb, `Tiempos_Extra_${oficialSeleccionado}.xlsx`);
        }
    </script>
</body>
</html>

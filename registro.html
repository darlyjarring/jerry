<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiApp - Control de Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold italic tracking-wider">LOGI-APP v3</h1>
            <span id="status" class="text-xs bg-blue-800 px-3 py-1 rounded-full text-blue-200">Sincronizado</span>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 mt-4">
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
            <form id="logi-form" class="space-y-6">
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Fecha/Hora Inicio</label>
                        <div class="flex space-x-1">
                            <input type="date" id="f-ini" class="w-full p-2 text-sm border rounded shadow-sm" required>
                            <input type="time" id="h-ini" class="p-2 text-sm border rounded shadow-sm" required>
                        </div>
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Fecha/Hora Fin</label>
                        <div class="flex space-x-1">
                            <input type="date" id="f-fin" class="w-full p-2 text-sm border rounded shadow-sm" required>
                            <input type="time" id="h-fin" class="p-2 text-sm border rounded shadow-sm" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Ruta</label>
                        <select id="ruta" class="w-full p-2 text-sm border rounded bg-white" onchange="logicEmpacreci()">
                            <option value="Empacreci">Empacreci</option>
                            <option value="Huaquillas">Huaquillas</option>
                            <option value="Taura">Taura</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Vehículos</label>
                        <input type="text" id="vehiculo" class="w-full p-2 text-sm border rounded" placeholder="24-24-35-35">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-slate-600 uppercase">Selección de Oficiales (Desde Base de Datos)</label>
                        <button type="button" onclick="cargarOficiales()" class="text-blue-600 text-[10px] hover:underline font-bold">
                            <i class="fas fa-sync-alt"></i> RECARGAR LISTA
                        </button>
                    </div>
                    <div id="check-container" class="grid grid-cols-1 md:grid-cols-3 gap-2 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                        <p class="text-slate-400 text-sm animate-pulse">Cargando oficiales...</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">ALIMENTACIÓN</label>
                        <input type="number" step="0.01" id="alim" class="w-full p-2 border rounded" value="5.50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">OBSERVACIONES</label>
                        <input type="text" id="obs" class="w-full p-2 border rounded" placeholder="...">
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all flex justify-center items-center">
                    <i class="fas fa-save mr-2"></i> REGISTRAR Y SINCRONIZAR
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec"; 

        // Cargar oficiales al iniciar
        window.onload = () => {
            cargarOficiales();
            // Poner fecha de hoy por defecto
            document.getElementById('f-ini').valueAsDate = new Date();
            document.getElementById('f-fin').valueAsDate = new Date();
        };

        function cargarOficiales() {
            const container = document.getElementById('check-container');
            container.innerHTML = '<p class="text-slate-400 text-sm italic">Sincronizando con Sheet...</p>';
            
            // Si estás probando localmente sin el servidor, esto fallará. 
            // En producción (dentro de Apps Script), llama a la función .gs
            try {
                google.script.run.withSuccessHandler(list => {
                    container.innerHTML = list.map(name => `
                        <label class="flex items-center space-x-3 p-2 bg-white rounded-lg border shadow-sm cursor-pointer hover:border-blue-300">
                            <input type="checkbox" name="oficial" value="${name}" class="oficial-cb w-4 h-4 text-blue-600 rounded">
                            <span class="text-sm font-medium text-slate-700">${name}</span>
                        </label>
                    `).join('');
                    logicEmpacreci(); // Check automático si es Empacreci
                }).getOficiales();
            } catch (e) {
                container.innerHTML = '<p class="text-red-400 text-sm">Error: Ejecutar desde Google Apps Script</p>';
            }
        }

        function logicEmpacreci() {
            if(document.getElementById('ruta').value === "Empacreci") {
                document.querySelectorAll('.oficial-cb').forEach(cb => cb.checked = true);
            }
        }

        document.getElementById('logi-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            // Cálculos
            const d1 = new Date(`${document.getElementById('f-ini').value}T${document.getElementById('h-ini').value}`);
            const d2 = new Date(`${document.getElementById('f-fin').value}T${document.getElementById('h-fin').value}`);
            const diff = (d2 - d1) / (1000 * 60 * 60);
            
            if(diff < 0) return alert("Fechas inválidas");

            const hrs = Math.floor(diff);
            const min = Math.round((diff % 1) * 60);
            const totalStr = `${hrs}:${min.toString().padStart(2, '0')}`;
            const r9 = diff > 9 ? (diff - 9) : 0;
            const esDom = d1.getDay() === 0;

            const oficialList = Array.from(document.querySelectorAll('.oficial-cb:checked')).map(c => c.value).join("\n");

            const payload = {
                registros: [{
                    fechaIni: document.getElementById('f-ini').value,
                    horaIni: document.getElementById('h-ini').value,
                    fechaFin: document.getElementById('f-fin').value,
                    horaFin: document.getElementById('h-fin').value,
                    fullIni: `${document.getElementById('f-ini').value} ${document.getElementById('h-ini').value}`,
                    fullFin: `${document.getElementById('f-fin').value} ${document.getElementById('h-fin').value}`,
                    totalHrs: totalStr,
                    resta9: r9.toFixed(2),
                    h50: esDom ? "" : r9.toFixed(2),
                    h100: esDom ? r9.toFixed(2) : "",
                    alimentacion: document.getElementById('alim').value,
                    ruta: document.getElementById('ruta').value,
                    vehiculo: document.getElementById('vehiculo').value,
                    oficiales: oficialList,
                    observaciones: document.getElementById('obs').value
                }]
            };

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> ENVIANDO...';

            google.script.run.withSuccessHandler(() => {
                alert("✓ Registro guardado en Google Sheets");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> REGISTRAR Y SINCRONIZAR';
                this.reset();
                cargarOficiales();
            }).doPost({postData: {contents: JSON.stringify(payload)}});
        });
    </script>
</body>
</html>

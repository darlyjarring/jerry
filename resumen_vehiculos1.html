<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Vehículos - LogiApp GH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-stats { border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-truck-moving text-xl text-blue-300"></i>
                <h1 class="text-lg font-black tracking-tighter uppercase">Resumen Total <span class="text-blue-300">Vehículos</span></h1>
            </div>
            <a href="index.html" class="text-[10px] bg-blue-800 px-3 py-1 rounded-full font-bold hover:bg-blue-700 uppercase">
                <i class="fas fa-arrow-left mr-1"></i> Volver
            </a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Control por Oficiales</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Inicio</label>
                    <input type="date" id="resIni" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Fin</label>
                    <input type="date" id="resFin" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="generarReporteVehiculos()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 transition-all shadow-md active:scale-95">
                        <i class="fas fa-chart-bar mr-2"></i> CONTAR VEHÍCULOS
                    </button>
                </div>
            </div>
        </div>

        <div id="accionesExport" class="hidden">
            <button onclick="descargarExcelVehiculos()" class="w-full bg-green-600 text-white font-black px-6 py-3 rounded-xl hover:bg-green-700 shadow-md flex items-center justify-center">
                <i class="fas fa-file-excel mr-2 text-lg"></i> EXPORTAR CONTROL DE CARGA (.XLSX)
            </button>
        </div>

        <div id="contenedorVehiculos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>

    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec";
        let datosVehiculosGlobal = null;

        function generarReporteVehiculos() {
            const ini = document.getElementById('resIni').value;
            const fin = document.getElementById('resFin').value;
            if(!ini || !fin) return alert("Selecciona el rango de fechas");

            const contenedor = document.getElementById('contenedorVehiculos');
            contenedor.innerHTML = `<div class="col-span-full text-center py-10"><i class="fas fa-circle-notch animate-spin text-3xl text-blue-600 mb-2"></i><p class="text-[10px] font-black text-slate-400 uppercase">Analizando registros de vehículos...</p></div>`;

            // Usamos el mismo action=getResumen pero procesaremos el campo 'vehiculos' que devuelve tu script
            const callbackName = 'cb_vehiculos';
            window[callbackName] = function(data) {
                datosVehiculosGlobal = data;
                renderizarTarjetasVehiculos(data);
                document.getElementById('accionesExport').classList.remove('hidden');
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${APP_URL}?action=getResumen&ini=${ini}&fin=${fin}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        function renderizarTarjetasVehiculos(data) {
            const contenedor = document.getElementById('contenedorVehiculos');
            let html = '';
            
            Object.keys(data).forEach(oficial => {
                const o = data[oficial];
                
                // Lógica de clasificación:
                // Asumimos que o.vehiculos es un array o string que viene del Apps Script
                // Si viene como string acumulado: "35-34, P-01, Taura 12"
                // Aquí simulamos el conteo basado en tu regla:
                
                let totalCargados = 0;
                let cuentaTaura = 0;
                let cuentaPlacas = 0;

                // Esta parte asume que el backend envía la lista de vehículos procesada
                // Si el backend solo envía el total, deberás ajustar el Apps Script para enviar el string original
                const lista = (o.listaVehiculos || "").split(/[,-]/); 

                lista.forEach(item => {
                    const v = item.trim().toUpperCase();
                    if(!v) return;
                    
                    totalCargados++;
                    if(v.includes('P')) {
                        cuentaPlacas++;
                    } else {
                        cuentaTaura++; // Todo lo que no es P (números, "Taura")
                    }
                });

                html += `
                    <div class="bg-white p-5 rounded-2xl card-stats shadow-sm border-t-4 border-t-blue-900">
                        <h3 class="font-black text-blue-900 text-xs uppercase mb-4 border-b pb-2">${oficial}</h3>
                        
                        <div class="space-y-3">
                            <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl">
                                <span class="text-[10px] font-black text-blue-600 uppercase">Total Vehículos:</span>
                                <span class="text-2xl font-black text-blue-900">${totalCargados}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <p class="text-[8px] font-bold text-slate-400 uppercase">Tipo Taura</p>
                                    <p class="text-xl font-black text-slate-700">${cuentaTaura}</p>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <p class="text-[8px] font-bold text-slate-400 uppercase">Placas (P)</p>
                                    <p class="text-xl font-black text-slate-700">${cuentaPlacas}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        function descargarExcelVehiculos() {
            if (!datosVehiculosGlobal) return;
            const filasExcel = [];
            filasExcel.push(["REPORTE DE CARGA DE VEHÍCULOS POR OFICIAL"]);
            filasExcel.push(["PERIODO:", document.getElementById('resIni').value, "AL", document.getElementById('resFin').value]);
            filasExcel.push([]); 
            filasExcel.push(["OFICIAL", "TOTAL VEHÍCULOS", "TAURAS", "PLACAS (P)", "CANT. VIAJES"]);

            Object.keys(datosVehiculosGlobal).forEach(oficial => {
                const o = datosVehiculosGlobal[oficial];
                // Misma lógica de conteo para el Excel
                const lista = (o.listaVehiculos || "").split(/[,-]/);
                let cT = 0, cP = 0;
                lista.forEach(i => {
                    const v = i.trim().toUpperCase();
                    if(v) v.includes('P') ? cP++ : cT++;
                });

                filasExcel.push([oficial, (cT + cP), cT, cP, o.viajes]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(filasExcel);
            XLSX.utils.book_append_sheet(wb, ws, "ControlCarga");
            XLSX.writeFile(wb, `Control_Vehiculos_${document.getElementById('resFin').value}.xlsx`);
        }
    </script>
</body>
</html>

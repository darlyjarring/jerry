<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiApp GH - Registro de Viajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; }
        /* Estilo para simular celdas de Excel en el historial */
        .excel-table th, .excel-table td { border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-900 tracking-tighter">LOGIAPP <span class="text-blue-600">GH</span></h1>
            <div class="flex space-x-6">
                <button onclick="tab('reg')" id="b-reg" class="font-bold text-xs active-btn pb-1">REGISTRO</button>
                <button onclick="tab('his')" id="b-his" class="font-bold text-xs text-gray-400 pb-1">HISTORIAL</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 mt-4">
        
        <div id="reg" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-900">
                <form id="formViaje" class="space-y-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-3 rounded-lg">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Fecha Inicio</label>
                            <input type="date" id="f1" class="w-full p-2 border rounded text-sm" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Hora Inicio</label>
                            <input type="time" id="h1" class="w-full p-2 border rounded text-sm" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Fecha Fin</label>
                            <input type="date" id="f2" class="w-full p-2 border rounded text-sm" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Hora Fin</label>
                            <input type="time" id="h2" class="w-full p-2 border rounded text-sm" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Ruta</label>
                            <select id="ruta" class="w-full p-2 border rounded text-sm bg-white" onchange="checkEmpacreci()"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Vehículo / Placa</label>
                            <input type="text" id="veh" class="w-full p-2 border rounded text-sm" placeholder="Ej: 24-24-35-35">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Alimentación ($)</label>
                            <input type="number" step="0.01" id="alim" class="w-full p-2 border rounded text-sm font-bold text-green-700" placeholder="0.00">
                        </div>
                    </div>

                    <div class="border p-4 rounded-lg bg-slate-50">
                        <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase">Oficiales asignados:</label>
                        <div id="listaOfic" class="grid grid-cols-2 md:grid-cols-3 gap-2">
                            <p class="text-xs text-gray-400 italic">Cargando oficiales...</p>
                        </div>
                    </div>

                    <button type="submit" id="btnS" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition-all">
                        <i class="fas fa-save mr-2"></i>GUARDAR REGISTRO EN EXCEL
                    </button>
                </form>
            </div>
        </div>

        <div id="his" class="tab-content space-y-4">
            <div class="bg-white rounded-lg shadow-xl overflow-x-auto border border-slate-200">
                <table class="w-full text-[10px] text-left border-collapse min-w-[1000px] excel-table">
                    <thead class="bg-blue-900 text-white uppercase tracking-wider">
                        <tr>
                            <th class="p-2">Fecha</th>
                            <th class="p-2">Ruta / Vehículo / Oficiales</th>
                            <th class="p-2 text-center">Total Hrs</th>
                            <th class="p-2 text-center">(-9)</th>
                            <th class="p-2 text-center">50%</th>
                            <th class="p-2 text-center">100%</th>
                            <th class="p-2 text-center">Alim.</th>
                            <th class="p-2 w-1/4 text-center">Observaciones (Escribir + Enter)</th>
                        </tr>
                    </thead>
                    <tbody id="resBody" class="divide-y divide-slate-200 text-slate-700 bg-blue-50/30"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec"; // REEMPLAZA ESTO
        let localDB = [];

        window.onload = () => {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('f1').value = hoy;
            document.getElementById('f2').value = hoy;
            cargarDatos();
        };

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('b-reg').className = id === 'reg' ? 'font-bold text-xs active-btn pb-1' : 'font-bold text-xs text-gray-400 pb-1';
            document.getElementById('b-his').className = id === 'his' ? 'font-bold text-xs active-btn pb-1' : 'font-bold text-xs text-gray-400 pb-1';
        }

        function cargarDatos() {
            const callbackName = 'callback_' + Math.round(Math.random() * 1000000);
            window[callbackName] = function(res) {
                document.getElementById('ruta').innerHTML = res.rutas.map(r => `<option value="${r}">${r}</option>`).join('');
                document.getElementById('listaOfic').innerHTML = res.oficiales.map(o => `
                    <label class="flex items-center space-x-2 p-2 border rounded bg-white text-[11px] font-bold cursor-pointer hover:bg-blue-50">
                        <input type="checkbox" name="ofic" value="${o}" class="ck-ofic"> <span>${o}</span>
                    </label>
                `).join('');
                localDB = res.historial;
                render(localDB);
                checkEmpacreci();
                delete window[callbackName];
            };
            const script = document.createElement('script');
            script.src = APP_URL + "?action=getData&callback=" + callbackName;
            document.body.appendChild(script);
        }

        function render(data) {
            document.getElementById('resBody').innerHTML = data.map(r => `
                <tr class="hover:bg-white transition-colors">
                    <td class="p-2 font-bold text-blue-900">${r.fecha}</td>
                    <td class="p-2">
                        <div class="font-black text-slate-800 uppercase">${r.ruta}</div>
                        <div class="text-[9px] text-blue-700 font-bold">${r.vehiculo || '---'}</div>
                        <div class="text-[8px] text-gray-500 italic mt-1">${r.oficiales}</div>
                    </td>
                    <td class="p-2 font-mono font-bold text-center bg-slate-50">${r.totalHrs}</td>
                    <td class="p-2 font-mono text-center text-orange-700 font-bold">${r.resta9}</td>
                    <td class="p-2 text-center font-bold text-blue-600">${r.h50 || '-'}</td>
                    <td class="p-2 text-center font-bold text-red-600">${r.h100 || '-'}</td>
                    <td class="p-2 text-center font-bold text-green-700">$${r.alim}</td>
                    <td class="p-1">
                        <input type="text" 
                               class="w-full p-2 bg-yellow-50/50 border border-yellow-200 rounded text-[10px] focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" 
                               placeholder="..." 
                               value="${r.obs}" 
                               onkeypress="guardarObsDirecto(event, ${r.index}, this)">
                    </td>
                </tr>
            `).reverse().join('');
        }

        function checkEmpacreci() {
            if(document.getElementById('ruta').value.toLowerCase().includes("empacreci")) {
                document.querySelectorAll('.ck-ofic').forEach(c => c.checked = true);
            }
        }

        function guardarObsDirecto(event, rowIndex, inputElement) {
            if (event.key === "Enter") {
                const nuevaObs = inputElement.value;
                inputElement.disabled = true;
                inputElement.classList.add('bg-green-100');
                
                fetch(`${APP_URL}?action=updateObs&row=${rowIndex}&obs=${encodeURIComponent(nuevaObs)}`)
                .then(() => {
                    inputElement.disabled = false;
                    inputElement.classList.remove('bg-green-100');
                    inputElement.style.borderColor = "#22c55e";
                    setTimeout(() => inputElement.style.borderColor = "", 2000);
                })
                .catch(() => {
                    inputElement.disabled = false;
                    alert("Error al guardar");
                });
            }
        }

        document.getElementById('formViaje').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnS');
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner animate-spin'></i> GUARDANDO...";

            const f1 = document.getElementById('f1').value;
            const h1 = document.getElementById('h1').value;
            const f2 = document.getElementById('f2').value;
            const h2 = document.getElementById('h2').value;

            const d1 = new Date(`${f1}T${h1}`);
            const d2 = new Date(`${f2}T${h2}`);
            const diffMs = d2 - d1;
            const diffHrs = diffMs / 36e5;

            const fmtFecha = (dateStr) => {
                const [y, m, d] = dateStr.split('-');
                return `${d}/${m}/${y}`;
            };

            let resta9Str = "0:00";
            if (diffHrs > 9) {
                const extraMs = diffMs - (9 * 36e5);
                const eHrs = Math.floor(extraMs / 36e5);
                const eMin = Math.round((extraMs % 36e5) / 60000);
                resta9Str = `${eHrs}:${eMin.toString().padStart(2, '0')}`;
            }

            const payload = {
                fechaIni: fmtFecha(f1),
                horaIni: h1,
                fechaFin: fmtFecha(f2),
                horaFin: h2,
                fullIni: `${fmtFecha(f1)} ${h1}`,
                fullFin: `${fmtFecha(f2)} ${h2}`,
                totalHrs: Math.floor(diffHrs) + ":" + Math.round((diffHrs % 1) * 60).toString().padStart(2, '0'),
                resta9: resta9Str,
                h50: d1.getDay() !== 0 && diffHrs > 9 ? (diffHrs - 9).toFixed(2) : "",
                h100: d1.getDay() === 0 && diffHrs > 9 ? (diffHrs - 9).toFixed(2) : "",
                alimentacion: document.getElementById('alim').value || "0.00",
                ruta: document.getElementById('ruta').value,
                vehiculo: document.getElementById('veh').value,
                oficiales: Array.from(document.querySelectorAll('.ck-ofic:checked')).map(c => c.value).join(", "),
                observaciones: ""
            };

            fetch(APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("✓ ¡Datos guardados correctamente!");
                location.reload();
            }).catch(() => {
                alert("Error de conexión");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>

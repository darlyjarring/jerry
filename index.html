<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-900 p-4 text-white flex justify-between shadow-lg">
        <h1 class="font-bold">LOGIAPP EXTERNAL</h1>
        <div class="space-x-4 text-xs font-bold">
            <button onclick="switchTab('reg')">REGISTRO</button>
            <button onclick="switchTab('his')">HISTORIAL</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <div id="reg" class="tab-content block bg-white p-6 rounded shadow">
            <form id="formLogi" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="f1" class="border p-2 rounded text-sm" required>
                    <input type="time" id="h1" class="border p-2 rounded text-sm" required>
                    <input type="date" id="f2" class="border p-2 rounded text-sm" required>
                    <input type="time" id="h2" class="border p-2 rounded text-sm" required>
                </div>
                <select id="ruta" class="w-full border p-2 rounded text-sm" onchange="autoCheck()"></select>
                <input type="text" id="veh" class="w-full border p-2 rounded text-sm" placeholder="Vehículo">
                <div class="border p-3 rounded bg-gray-50">
                    <p class="text-[10px] font-bold text-gray-400 mb-2">SELECCIONAR OFICIALES:</p>
                    <div id="contOfic" class="grid grid-cols-2 gap-2"></div>
                </div>
                <button type="submit" id="btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded">GUARDAR DATOS</button>
            </form>
        </div>

        <div id="his" class="tab-content hidden space-y-4">
            <div class="bg-white rounded shadow overflow-hidden">
                <table class="w-full text-[10px] text-left">
                    <thead class="bg-gray-200">
                        <tr><th class="p-2">Fecha</th><th class="p-2">Ruta</th><th class="p-2">Hrs</th><th class="p-2">Oficiales</th></tr>
                    </thead>
                    <tbody id="tBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // TU URL DE GOOGLE APPS SCRIPT
        const URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec";
        
        let db = [];

        window.onload = () => {
            // CARGAR DATOS USANDO FETCH (EVITA EL ERROR DE 'GOOGLE IS NOT DEFINED')
            fetch(URL + "?action=getData")
                .then(res => res.json())
                .then(res => {
                    document.getElementById('ruta').innerHTML = res.rutas.map(r => `<option value="${r}">${r}</option>`).join('');
                    document.getElementById('contOfic').innerHTML = res.oficiales.map(o => `
                        <label class="flex items-center space-x-2 text-[11px] p-1 border rounded bg-white">
                            <input type="checkbox" name="of" value="${o}" class="of-ck"> <span>${o}</span>
                        </label>
                    `).join('');
                    db = res.historial;
                    render(db);
                });
        };

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function render(data) {
            document.getElementById('tBody').innerHTML = data.map(r => `
                <tr><td class="p-2">${r.fecha}</td><td class="p-2 font-bold">${r.ruta}</td><td class="p-2">${r.totalHrs}</td><td class="p-2 text-gray-500">${r.oficiales}</td></tr>
            `).reverse().join('');
        }

        function autoCheck() {
            if(document.getElementById('ruta').value.toLowerCase().includes("empacreci")) {
                document.querySelectorAll('.of-ck').forEach(c => c.checked = true);
            }
        }

        document.getElementById('formLogi').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const d1 = new Date(`${document.getElementById('f1').value}T${document.getElementById('h1').value}`);
            const d2 = new Date(`${document.getElementById('f2').value}T${document.getElementById('h2').value}`);
            const diff = (d2 - d1) / 36e5;

            const payload = {
                fechaIni: document.getElementById('f1').value,
                horaIni: document.getElementById('h1').value,
                fechaFin: document.getElementById('f2').value,
                horaFin: document.getElementById('h2').value,
                fullIni: document.getElementById('f1').value + " " + document.getElementById('h1').value,
                fullFin: document.getElementById('f2').value + " " + document.getElementById('h2').value,
                totalHrs: Math.floor(diff) + ":" + Math.round((diff % 1) * 60).toString().padStart(2, '0'),
                resta9: diff > 9 ? (diff - 9).toFixed(2) : 0,
                h50: d1.getDay() !== 0 && diff > 9 ? (diff - 9).toFixed(2) : "",
                h100: d1.getDay() === 0 && diff > 9 ? (diff - 9).toFixed(2) : "",
                alimentacion: "5.50",
                ruta: document.getElementById('ruta').value,
                vehiculo: document.getElementById('veh').value,
                oficiales: Array.from(document.querySelectorAll('.of-ck:checked')).map(c => c.value).join(", "),
                observaciones: ""
            };

            fetch(URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Guardado!");
                location.reload();
            });
        });
    </script>
</body>
</html>

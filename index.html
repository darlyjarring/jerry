<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 p-4">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-6 border-t-8 border-blue-900">
        <h1 class="text-2xl font-black text-blue-900 mb-6 uppercase tracking-tighter"><i class="fas fa-truck"></i> Registro de Operaciones</h1>
        
        <form id="formLogistica" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-lg">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">INICIO (Fecha y Hora)</label>
                    <div class="flex gap-2">
                        <input type="date" id="f1" class="w-full p-2 border rounded" required>
                        <input type="time" id="h1" class="p-2 border rounded" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">FINAL (Fecha y Hora)</label>
                    <div class="flex gap-2">
                        <input type="date" id="f2" class="w-full p-2 border rounded" required>
                        <input type="time" id="h2" class="p-2 border rounded" required>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">RUTA (Desde Excel)</label>
                    <select id="ruta" class="w-full p-2 border rounded bg-white" onchange="checkEmpacreci()"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">VEHÍCULOS/TAURAS</label>
                    <input type="text" id="vehiculo" class="w-full p-2 border rounded" placeholder="24-24-35-35">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ALIMENTACIÓN</label>
                    <input type="number" step="0.01" id="alim" class="w-full p-2 border rounded" value="5.50">
                </div>
            </div>

            <div class="border rounded-lg p-4">
                <label class="block text-xs font-bold text-gray-500 mb-3 uppercase">Oficiales registrados en Excel:</label>
                <div id="listaOficiales" class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <p class="text-gray-400 italic">Cargando base de datos...</p>
                </div>
            </div>

            <button type="submit" id="btn" class="w-full bg-blue-900 text-white font-bold py-4 rounded-lg hover:bg-blue-800 transition-all">
                <i class="fas fa-save mr-2"></i> GUARDAR EN GOOGLE SHEETS
            </button>
        </form>
    </div>

    <script>
        // Cargar datos al abrir
        window.onload = () => {
            google.script.run.withSuccessHandler(data => {
                // Cargar Rutas
                const selectRuta = document.getElementById('ruta');
                selectRuta.innerHTML = data.rutas.map(r => `<option value="${r}">${r}</option>`).join('');
                
                // Cargar Oficiales
                const container = document.getElementById('listaOficiales');
                container.innerHTML = data.oficiales.map(o => `
                    <label class="flex items-center space-x-2 p-2 border rounded hover:bg-blue-50 cursor-pointer">
                        <input type="checkbox" name="ofic" value="${o}" class="ofic-check">
                        <span class="text-sm">${o}</span>
                    </label>
                `).join('');
                
                checkEmpacreci();
            }).getDataInicial();
        };

        function checkEmpacreci() {
            if(document.getElementById('ruta').value.toLowerCase().includes("empacreci")) {
                document.querySelectorAll('.ofic-check').forEach(c => c.checked = true);
            }
        }

        document.getElementById('formLogistica').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            
            const t1 = new Date(`${document.getElementById('f1').value}T${document.getElementById('h1').value}`);
            const t2 = new Date(`${document.getElementById('f2').value}T${document.getElementById('h2').value}`);
            const diff = (t2 - t1) / (1000 * 60 * 60);

            const totalStr = `${Math.floor(diff)}:${Math.round((diff % 1) * 60).toString().padStart(2, '0')}`;
            const r9 = diff > 9 ? (diff - 9) : 0;
            const esDom = t1.getDay() === 0;

            const seleccionados = Array.from(document.querySelectorAll('.ofic-check:checked')).map(c => c.value).join("\n");

            const payload = {
                fechaIni: document.getElementById('f1').value,
                horaIni: document.getElementById('h1').value,
                fechaFin: document.getElementById('f2').value,
                horaFin: document.getElementById('h2').value,
                fullIni: document.getElementById('f1').value + " " + document.getElementById('h1').value,
                fullFin: document.getElementById('f2').value + " " + document.getElementById('h2').value,
                totalHrs: totalStr,
                resta9: r9.toFixed(2),
                h50: esDom ? "" : r9.toFixed(2),
                h100: esDom ? r9.toFixed(2) : "",
                alimentacion: document.getElementById('alim').value,
                ruta: document.getElementById('ruta').value,
                vehiculo: document.getElementById('vehiculo').value,
                oficiales: seleccionados,
                observaciones: ""
            };

            btn.disabled = true;
            btn.innerHTML = "GUARDANDO...";

            google.script.run.withSuccessHandler(() => {
                alert("¡Guardado con éxito!");
                btn.disabled = false;
                btn.innerHTML = "GUARDAR EN GOOGLE SHEETS";
                this.reset();
            }).guardarRegistro(payload);
        });
    </script>
</body>
</html>

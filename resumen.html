<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Detallado - LogiApp GH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-excel { border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-file-invoice-dollar text-xl text-blue-300"></i>
                <h1 class="text-lg font-black tracking-tighter uppercase">Desglose <span class="text-blue-300">Horas y Valores</span></h1>
            </div>
            <a href="index.html" class="text-[10px] bg-blue-800 px-3 py-1 rounded-full font-bold hover:bg-blue-700 uppercase">
                <i class="fas fa-arrow-left mr-1"></i> Volver
            </a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Consulta de Registros</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="hidden" id="precioBase" value="2.50"> 
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Inicio</label>
                    <input type="date" id="resIni" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Fecha Fin</label>
                    <input type="date" id="resFin" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="generarResumen()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 transition-all shadow-md active:scale-95">
                        <i class="fas fa-sync-alt mr-2"></i> CONSULTAR
                    </button>
                </div>
            </div>
        </div>

        <div id="contenedorResumen" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>

    </div>

    <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbzCIqGEMpJOsdNzypJ7qLU3OOZ6mxgJz7JNXXK0fICFs1NijEiW9NQoltetlL7wHawU/exec";
    
    function formatoReloj(decimal) {
        if (!decimal || decimal <= 0) return "0:00";
        const horas = Math.floor(Math.abs(decimal));
        const minutos = Math.round((Math.abs(decimal) - horas) * 60);
        return `${horas}:${minutos.toString().padStart(2, '0')}`;
    }

    function generarResumen() {
        const ini = document.getElementById('resIni').value;
        const fin = document.getElementById('resFin').value;
        if(!ini || !fin) return alert("Selecciona fechas");

        document.getElementById('contenedorResumen').innerHTML = `<div class="col-span-full text-center py-20"><i class="fas fa-spinner animate-spin text-4xl text-blue-600"></i></div>`;

        const callbackName = 'cb_resumen_full';
        window[callbackName] = function(data) {
            renderizar(data);
            delete window[callbackName];
        };

        const script = document.createElement('script');
        script.src = `${APP_URL}?action=getResumen&ini=${ini}&fin=${fin}&callback=${callbackName}`;
        document.body.appendChild(script);
    }

    function renderizar(data) {
    const contenedor = document.getElementById('contenedorResumen');
    let html = '';

    Object.keys(data).forEach(oficial => {
        const o = data[oficial];
        
        // Sumamos las horas que el servidor ya procesó correctamente
        const totalHorasExtra = o.h50 + o.h100;
        // Sumamos el dinero (v50 y v100)
        const totalDinero = o.v50 + o.v100;

        html += `
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 p-4 border-b flex justify-between items-center">
                <span class="font-black text-blue-900 uppercase text-sm">${oficial}</span>
                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-3 py-1 rounded-full">${o.viajes} DÍAS</span>
            </div>

            <div class="p-5 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Tiempo en Ruta</p>
                        <p class="text-xl font-black text-slate-700">${formatoReloj(o.total)}</p>
                    </div>
                    <div class="text-center border-l">
                        <p class="text-[9px] font-bold text-blue-500 uppercase">Total Horas Extra</p>
                        <p class="text-xl font-black text-blue-600">${formatoReloj(totalHorasExtra)}</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center p-3 bg-orange-50 rounded-2xl border border-orange-100">
                        <div>
                            <p class="text-[9px] font-bold text-orange-600 uppercase">Horas 50%</p>
                            <p class="text-xs font-bold text-orange-400">${formatoReloj(o.h50)}</p>
                        </div>
                        <p class="text-xl font-black text-orange-700">$${o.v50.toFixed(2)}</p>
                    </div>

                    <div class="flex justify-between items-center p-3 bg-red-50 rounded-2xl border border-red-100">
                        <div>
                            <p class="text-[9px] font-bold text-red-600 uppercase">Horas 100%</p>
                            <p class="text-xs font-bold text-red-400">${formatoReloj(o.h100)}</p>
                        </div>
                        <p class="text-xl font-black text-red-700">$${o.v100.toFixed(2)}</p>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-2xl p-4 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-widest text-blue-300">Total Acumulado Extras</p>
                    <p class="text-3xl font-black text-green-400">$${totalDinero.toFixed(2)}</p>
                </div>
            </div>
        </div>`;
    });
    contenedor.innerHTML = html;
}
</script>
</body>
</html>
